<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LSI Cancer Docs{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">CancerLSI</span>
      </div>
      <nav class="main-nav">
        <a href="{{ url_for('index') }}" class="nav-btn {% if request.endpoint == 'index' %}active{% endif %}">
          Búsqueda
        </a>
        <a href="{{ url_for('compare') }}" class="nav-btn {% if request.endpoint == 'compare' %}active{% endif %}">
          Comparar
        </a>
        <a href="{{ url_for('lsi') }}" class="nav-btn {% if request.endpoint == 'lsi' %}active{% endif %}">
          LSI / SVD
        </a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Sistema de Recuperación Documental · Bases de Datos Avanzadas · Uso académico</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
